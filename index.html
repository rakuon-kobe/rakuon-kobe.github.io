<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 新歓予約システム | RakuOn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen font-sans">

    <div class="max-w-xl mx-auto px-4 py-8">
        
        <section id="page1" class="fade-in">
            <header class="text-center mb-12">
                <h1 class="text-4xl font-extrabold mb-2">🐱楽音 2026 新歓イベント🐱</h1>
                <p class="font-medium opacity-70">申し込みたいイベントを選択してください</p>
            </header>

            <div class="grid gap-6">
                <button id="btn-takopa" data-status="loading" onclick="loadEvent('takopa')" class="event-card">
                    <div>
                        <div id="date-takopa" class="font-bold flex items-center gap-2">4/18(土) 12:00〜</div>
                        <div id="title-takopa" class="text-2xl font-black mt-2">タコパ 🐙</div>
                    </div>
                    <div class="status-text mt-4">
                        <span class="txt-loading items-center gap-2 font-bold italic animate-pulse"><div class="loader w-4 h-4 border-2 border-slate-200 rounded-full"></div>確認中...</span>
                        <span class="txt-active text-sm font-normal opacity-60">予約受付中 →</span>
                        <span class="txt-full text-center text-red-600 font-black text-xl bg-red-50 py-2 rounded-xl border border-red-200 w-full">満員御礼</span>
                        <span class="txt-coming text-center font-bold bg-white py-2 rounded-xl border border-slate-200 w-full">予約受付前</span>
                        <span class="txt-ended text-center font-bold bg-slate-200 py-2 rounded-xl w-full opacity-50">イベント終了済み</span>
                        <span class="txt-error text-red-600 text-xs font-bold">⚠️ エラー：ページを更新してください</span>
                    </div>
                </button>

                <button id="btn-instrumentsA" data-status="loading" onclick="loadEvent('instrumentsA')" class="event-card">
                    <div>
                        <div id="date-instrumentsA" class="font-bold flex items-center gap-2">4/25(土) 10:20〜 / 11:30～ / 12:40～</div>
                        <div id="title-instrumentsA" class="text-2xl font-black mt-2">楽器体験会A 🎸</div>
                    </div>
                    <div class="status-text mt-4">
                        <span class="txt-loading items-center gap-2 font-bold italic animate-pulse"><div class="loader w-4 h-4 border-2 border-slate-200 rounded-full"></div>確認中...</span>
                        <span class="txt-active text-sm font-normal opacity-60">予約受付中 →</span>
                        <span class="txt-full text-center text-red-600 font-black text-xl bg-red-50 py-2 rounded-xl border border-red-200 w-full">満員御礼</span>
                        <span class="txt-coming text-center font-bold bg-white py-2 rounded-xl border border-slate-200 w-full">予約受付前</span>
                        <span class="txt-ended text-center font-bold bg-slate-200 py-2 rounded-xl w-full opacity-50">イベント終了済み</span>
                        <span class="txt-error text-red-600 text-xs font-bold">⚠️ エラー：ページを更新してください</span>
                    </div>
                </button>

                <button id="btn-picnic" data-status="loading" onclick="loadEvent('picnic')" class="event-card">
                    <div>
                        <div id="date-picnic" class="font-bold flex items-center gap-2">5/2(土) 12:00〜</div>
                        <div id="title-picnic" class="text-2xl font-black mt-2">ピクニック 🥪</div>
                    </div>
                    <div class="status-text mt-4">
                        <span class="txt-loading items-center gap-2 font-bold italic animate-pulse"><div class="loader w-4 h-4 border-2 border-slate-200 rounded-full"></div>確認中...</span>
                        <span class="txt-active text-sm font-normal opacity-60">予約受付中 →</span>
                        <span class="txt-full text-center text-red-600 font-black text-xl bg-red-50 py-2 rounded-xl border border-red-200 w-full">満員御礼</span>
                        <span class="txt-coming text-center font-bold bg-white py-2 rounded-xl border border-slate-200 w-full">予約受付前</span>
                        <span class="txt-ended text-center font-bold bg-slate-200 py-2 rounded-xl w-full opacity-50">イベント終了済み</span>
                        <span class="txt-error text-red-600 text-xs font-bold">⚠️ エラー：ページを更新してください</span>
                    </div>
                </button>

                <button id="btn-instrumentsB" data-status="loading" onclick="loadEvent('instrumentsB')" class="event-card">
                    <div>
                        <div id="date-instrumentsB" class="font-bold flex items-center gap-2">5/9(土) 10:20〜 / 11:30～ / 12:40～</div>
                        <div id="title-instrumentsB" class="text-2xl font-black mt-2">楽器体験会B 🎸</div>
                    </div>
                    <div class="status-text mt-4">
                        <span class="txt-loading items-center gap-2 font-bold italic animate-pulse"><div class="loader w-4 h-4 border-2 border-slate-200 rounded-full"></div>確認中...</span>
                        <span class="txt-active text-sm font-normal opacity-60">予約受付中 →</span>
                        <span class="txt-full text-center text-red-600 font-black text-xl bg-red-50 py-2 rounded-xl border border-red-200 w-full">満員御礼</span>
                        <span class="txt-coming text-center font-bold bg-white py-2 rounded-xl border border-slate-200 w-full">予約受付前</span>
                        <span class="txt-ended text-center font-bold bg-slate-200 py-2 rounded-xl w-full opacity-50">イベント終了済み</span>
                        <span class="txt-error text-red-600 text-xs font-bold">⚠️ エラー：ページを更新してください</span>
                    </div>
                </button>

                <button id="btn-live" data-status="loading" onclick="loadEvent('live')" class="event-card">
                    <div>
                        <div id="date-live" class="font-bold flex items-center gap-2">5/16(土) 13:30～</div>
                        <div id="title-live" class="text-2xl font-black mt-2">新歓ライブ 🎤</div>
                    </div>
                    <div class="status-text mt-4">
                        <span class="txt-loading items-center gap-2 font-bold italic animate-pulse"><div class="loader w-4 h-4 border-2 border-slate-200 rounded-full"></div>確認中...</span>
                        <span class="txt-active text-sm font-normal opacity-60">予約受付中 →</span>
                        <span class="txt-full text-center text-red-600 font-black text-xl bg-red-50 py-2 rounded-xl border border-red-200 w-full">満員御礼</span>
                        <span class="txt-coming text-center font-bold bg-white py-2 rounded-xl border border-slate-200 w-full">予約受付前</span>
                        <span class="txt-ended text-center font-bold bg-slate-200 py-2 rounded-xl w-full opacity-50">イベント終了済み</span>
                        <span class="txt-error text-red-600 text-xs font-bold">⚠️ エラー：ページを更新してください</span>
                    </div>
                </button>
            </div>
        </section>

        <section id="page-detail" class="hidden fade-in">
            <button onclick="location.reload()" class="mb-8 text-slate-500 font-bold hover:underline flex items-center gap-1">
                ← イベント一覧に戻る
            </button>
            
            <div class="bg-white shadow-2xl rounded-3xl p-8 border detail-card">
                <h2 id="detail-title" class="text-4xl font-extrabold mb-10 leading-tight"></h2>
                
                <div class="mb-10">
                    <div class="flex-item">
                        <div class="label-box">📅 日時</div>
                        <div id="detail-date" class="content-box"></div>
                    </div>
                    <div class="flex-item">
                        <div class="label-box">📍 場所</div>
                        <div id="detail-location" class="content-box"></div>
                    </div>
                    <div class="flex-item">
                        <div class="label-box">💰 参加費</div>
                        <div id="detail-fee" class="content-box font-black text-lg"></div>
                    </div>
                    <div class="flex-item">
                        <div class="label-box">📝 内容</div>
                        <div id="detail-description" class="content-box"></div>
                    </div>
                    <div class="flex-item">
                        <div class="label-box">🎒 持ち物</div>
                        <div id="detail-belongings" class="content-box"></div>
                    </div>
                </div>

                <button onclick="goToForm()" class="primary-btn">
                    このイベントを予約する →
                </button>
            </div>
        </section>

        <section id="page2" class="hidden fade-in">
            <button onclick="backToDetail()" class="mb-8 text-slate-500 font-bold hover:underline flex items-center gap-1">
                ← イベント詳細に戻る
            </button>
            
            <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border">
                <div id="formHeader" class="px-8 py-10 transition-colors duration-500">
                    <h2 id="eventTitle" class="text-3xl font-black uppercase tracking-tight text-white">RESERVATION</h2>
                    <p class="opacity-70 text-sm font-bold mt-1 text-white">必要事項を入力してください</p>
                </div>

                <form id="mainForm" class="p-8 space-y-8">
                    <input type="hidden" id="event_name" name="event_name">

                    <div style="display:none;">
                        <input type="text" name="hp_field" tabindex="-1" autocomplete="off">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold mb-2 opacity-80">氏名</label>
                            <input type="text" name="name" required class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none" placeholder="楽音 太郎">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 opacity-80">Instagram アカウント名</label>
                            <input type="text" name="instagram" required pattern="^@.*" title="@から始めてください" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none" placeholder="@rakuon_kobe">
                        </div>
                    </div>

                    <div id="instruments_extra" class="hidden space-y-6">
                        <div class="border-t pt-6">
                            <label class="block text-sm font-bold mb-4 opacity-80">希望の時間と楽器を選択（1人1枠まででお願いします）</label>
                            <div class="overflow-x-auto rounded-xl border border-slate-100 shadow-sm">
                                <table class="w-full text-sm text-center border-collapse">
                                    <thead class="bg-slate-50">
                                        <tr>
                                            <th class="p-3 border-b border-r font-medium opacity-50">時間</th>
                                            <th class="p-3 border-b border-r">ギター</th>
                                            <th class="p-3 border-b border-r">ベース</th>
                                            <th class="p-3 border-b">ドラム</th>
                                        </tr>
                                    </thead>
                                    <tbody id="capacityTable"></tbody>
                                </table>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold mb-2 opacity-80">体験する楽器の経験</label>
                                <select name="experience" id="expSelect" onchange="toggleBringOwn()" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none">
                                    <option value="経験なし">経験なし</option>
                                    <option value="経験あり">経験あり</option>
                                </select>
                            </div>
                            <div id="bringOwnBox" class="hidden">
                                <label class="block text-sm font-bold mb-2 opacity-80">自分の楽器を持ってくる？</label>
                                <select name="bring_own" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none">
                                    <option value="持ってこない">持ってこない</option>
                                    <option value="持ってくる">持ってくる</option>
                                </select>
                                <p class="text-[11px] opacity-50 mt-1">※ドラムの場合はスティック</p>
                            </div>
                        </div>
                    </div>

                    <div id="live_extra" class="hidden border-t pt-6">
                        <label class="block text-sm font-bold mb-2 opacity-80">一番楽しみなバンド</label>
                        <select name="target_artist" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none">
                            <option value="特になし">特になし</option>
                            <option value="バンドA">SUPER BEAVER</option>
                            <option value="バンドB">SHISHAMO</option>
                            <option value="バンドC">シンガーズハイ</option>
                            <option value="バンドD">SCANDAL</option>
                            <option value="バンドE">BUMP OF CHICKEN</option>
                            <option value="バンドF">ポルカドットスティングレイ</option>
                            <option value="バンドG">幹部バンド</option>
                            <option value="バンドH">NELKE</option>
                            <option value="バンドI">ヨルシカ</option>
                            <option value="バンドJ">Kroi</option>
                        </select>
                    </div>

                    <div id="takopa_extra" class="hidden border-t pt-6">
                        <label class="block text-sm font-bold mb-2 opacity-80">食物アレルギーの有無</label>
                        <input type="text" name="allergies" placeholder="なし / エビ・カニなど" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none">
                    </div>

                    <div class="border-t pt-6">
                        <label class="block text-sm font-bold mb-2 opacity-80">その他何かあれば</label>
                        <textarea name="message" rows="3" class="w-full px-4 py-3 border border-slate-200 rounded-xl outline-none" placeholder="友達と一緒に参加される場合は、お相手のお名前もこちらにご記入ください！"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="primary-btn">
                        予約を確定する
                    </button>
                </form>
            </div>
        </section>

        <section id="page3" class="hidden fade-in text-center py-20">
            <div class="text-8xl mb-8">✨</div>
            <h2 class="text-4xl font-black mb-4">予約が完了しました！</h2>
            <p class="opacity-60 text-lg mb-12">後ほど楽音公式Instagramから詳細をお送りします。<br>24時間以内に届かない場合、DMでお問い合わせください🙇‍♀️</p>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-12 py-4 rounded-full font-bold hover:shadow-2xl transition shadow-xl">
                トップページへ戻る
            </button>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
